<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rustecom CRUD Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <div>
        <h1>Rustecom CRUD Explorer</h1>
        <p class="subtitle">Test and perform CRUD operations across all tables.</p>
      </div>
      <div class="header-actions">
        <button id="create-user">Create / Use Demo User</button>
        <span id="user-info">No demo user yet</span>
      </div>
    </header>

    <main>
      <section>
        <h2>Product Browser</h2>
        <div class="products-filter-panel">
          <div class="filter-grid">
            <label>
              Search
              <input id="product-search" type="text" placeholder="Search by title or description..." />
            </label>
            <label>
              Category
              <select id="product-category">
                <option value="">All Categories</option>
              </select>
            </label>
            <label>
              Min Price ($)
              <input id="product-min-price" type="number" placeholder="0" min="0" />
            </label>
            <label>
              Max Price ($)
              <input id="product-max-price" type="number" placeholder="No limit" min="0" />
            </label>
            <label>
              Items per page
              <select id="product-limit">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </label>
          </div>
          <div class="button-row">
            <button id="apply-filters">Apply Filters</button>
            <button id="clear-filters">Clear Filters</button>
          </div>
          <div class="api-call-display">
            <strong>API Endpoint:</strong>
            <code id="product-api-endpoint">GET /api/products?limit=20&offset=0</code>
          </div>
        </div>

        <div class="products-display">
          <div id="products-info"></div>
          <div id="products-grid" class="products-grid"></div>
          <div id="products-pagination" class="pagination-controls"></div>
        </div>
      </section>

      <section>
        <h2>CRUD Test Panel</h2>
        <div class="form-grid">
          <label>
            Table
            <select id="table-select"></select>
          </label>
          <label>
            Operation
            <select id="operation-select">
              <option value="list">List</option>
              <option value="get">Get</option>
              <option value="create">Create</option>
              <option value="update">Update</option>
              <option value="delete">Delete</option>
            </select>
          </label>
          <label id="id-label" class="input-group hidden">
            Row ID
            <input id="row-id" type="text" placeholder="id or composite id (comma-separated)" />
          </label>
          <label id="body-label" class="input-group hidden full-width">
            JSON Body
            <textarea id="request-body" rows="14" placeholder='{"id":"...", "name":"..."}'></textarea>
          </label>
        </div>

        <div class="button-row">
          <button id="fill-sample">Fill Sample Body</button>
          <button id="execute-request">Execute Request</button>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <h3>Request</h3>
            <pre id="request-display">Select a table and operation to see the request.</pre>
          </div>
          <div class="info-card">
            <h3>Response</h3>
            <pre id="response-display">Response output appears here.</pre>
          </div>
        </div>
      </section>

      <section>
        <h2>Table Metadata</h2>
        <div id="metadata"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
