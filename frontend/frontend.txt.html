    <script>
      const API = "http://localhost:3000";
      // const API = "http://130.110.243.212:3000";

      let PRICE_MAX = 700;

      // Image cache keyed by product ID
      const productImageCache = {};
      // Original (pre-discount) price cache keyed by product ID
      const originalPriceCache = {};
      // Category name lookup keyed by category ID
      const categoryNameCache = {};

      let state = {
        user: null,
        cart: null,
        currentPage: "shop",
        products: { items: [], total: 0, limit: 20, offset: 0 },
        categories: [],
        selectedCategory: "",
        viewMode: "grid",
        searchDebounce: null,
        currentProduct: null,
        modalQty: 1,
        expandedOrders: new Map(),
        admin: {
          tables: [],
          currentTable: null,
          rows: [],
          sortCol: null,
          sortDir: "asc",
          filter: "",
          crudMode: null,
          crudRow: null,
          meta: null,
          editPk: null,
        },
      };

      const $ = (id) => document.getElementById(id);
      const fmtPrice = (cents) => {
        const abs = Math.abs(cents);
        return `$${Math.floor(abs / 100).toLocaleString()}.${String(abs % 100).padStart(2, "0")}`;
      };
      const fmtDate = (str) => {
        try {
          return new Date(str).toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
        } catch {
          return str || "—";
        }
      };
      const trunc = (s, n) => (s && s.length > n ? s.slice(0, n) + "…" : s || "");

      async function api(method, path, body) {
        const opts = { method, headers: { "Content-Type": "application/json" } };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(API + path, opts);
        if (!r.ok) {
          const err = await r.json().catch(() => ({ error: r.statusText }));
          throw new Error(err.error || `HTTP ${r.status}`);
        }
        return r.json();
      }

      function toast(msg, type = "info") {
        const c = $("toasts"),
          t = document.createElement("div");
        t.className = `toast ${type}`;
        t.innerHTML = `<span class="toast-dot"></span>${msg}`;
        c.appendChild(t);
        setTimeout(() => {
          t.classList.add("leaving");
          t.addEventListener("animationend", () => t.remove(), { once: true });
        }, 3000);
      }

      /* THEME */
      function setTheme(name) {
        document.documentElement.dataset.theme = name;
        document.querySelectorAll(".theme-option").forEach((b) => b.classList.toggle("active", b.dataset.theme === name));
        localStorage.setItem("arcane-theme", name);
        $("theme-dropdown").classList.remove("open");
      }
      function toggleThemePicker(e) {
        e.stopPropagation();
        $("theme-dropdown").classList.toggle("open");
      }
      document.addEventListener("click", () => $("theme-dropdown").classList.remove("open"));

      /* NAV */
      function navigate(page) {
        state.currentPage = page;
        document.querySelectorAll(".page").forEach((p) => p.classList.remove("active"));
        document.querySelectorAll(".nav-tab").forEach((t) => t.classList.toggle("active", t.dataset.page === page));
        $(`page-${page}`).classList.add("active");
        if (page === "admin") initAdmin();
      }

      /* FILTER DROPDOWNS */
      function toggleFilter(bodyId, toggleId) {
        const body = $(bodyId),
          toggle = $(toggleId);
        const open = !body.classList.contains("open");
        body.classList.toggle("open", open);
        toggle.classList.toggle("open", open);
      }

      /* DUAL RANGE SLIDER */
      function initDualSlider() {
        const minS = $("price-slider-min"),
          maxS = $("price-slider-max");
        const fill = $("range-fill"),
          minL = $("price-min-label"),
          maxL = $("price-max-label");
        function update(who) {
          let min = parseInt(minS.value),
            max = parseInt(maxS.value);
          const GAP = 10;
          if (who === "min" && min > max - GAP) {
            min = max - GAP;
            minS.value = min;
          }
          if (who === "max" && max < min + GAP) {
            max = min + GAP;
            maxS.value = max;
          }
          fill.style.left = (min / PRICE_MAX) * 100 + "%";
          fill.style.width = ((max - min) / PRICE_MAX) * 100 + "%";
          minL.textContent = min === 0 ? "$0" : `$${min}`;
          maxL.textContent = max >= PRICE_MAX ? "Any" : `$${max}`;
          debouncedSearch();
        }
        minS.addEventListener("input", () => update("min"));
        maxS.addEventListener("input", () => update("max"));
        update("min");
      }

      /* USER */
      async function connectUser() {
        const btn = $("connect-btn");
        btn.disabled = true;
        btn.textContent = "Connecting…";
        try {
          state.user = await api("POST", "/api/users/demo");
          $("user-badge").textContent = state.user.full_name || state.user.email;
          $("user-badge").className = "user-badge active";
          btn.textContent = "Connected";
          toast("Session connected", "success");
          await loadCart();
        } catch (e) {
          toast(e.message, "error");
          btn.disabled = false;
          btn.textContent = "Connect";
        }
      }

      /* ── PROMOTIONS SIDEBAR ── */
      async function loadPromotions() {
        const container = $("promo-list-container");
        try {
          const discounts = await api("GET", "/api/table/discounts");
          const active = discounts.filter((d) => d.active === true || d.active === 1 || d.active === "1");

          if (!active.length) {
            container.innerHTML = `<p class="promo-empty">No active offers right now.</p>`;
            return;
          }

          container.innerHTML = `<div class="promo-list">${active
            .map((d) => {
              let scope = "";
              if (d.category_id) {
                const catName = categoryNameCache[d.category_id] || "Selected category";
                scope = `On all <strong style="color:var(--text2)">${catName}</strong> items`;
              } else if (d.min_price_cents != null && d.max_price_cents != null) {
                scope = `Items ${fmtPrice(d.min_price_cents)} – ${fmtPrice(d.max_price_cents)}`;
              } else if (d.min_price_cents != null) {
                scope = `Items over ${fmtPrice(d.min_price_cents)}`;
              } else if (d.max_price_cents != null) {
                scope = `Items under ${fmtPrice(d.max_price_cents)}`;
              } else {
                scope = "All items";
              }
              return `<div class="promo-item">
              <div class="promo-percent-block">
                <span class="promo-percent-num">${d.percent}</span>
                <span class="promo-percent-off">% off</span>
              </div>
              <div class="promo-info">
                <div class="promo-name">${d.name}</div>
                <div class="promo-scope">${scope}</div>
              </div>
            </div>`;
            })
            .join("")}</div>`;
        } catch (e) {
          container.innerHTML = `<p class="promo-empty">Could not load offers.</p>`;
        }
      }

      /* PRODUCTS */
      async function fetchCategories() {
        try {
          state.categories = await api("GET", "/api/categories");
          // Populate the category name cache for promo display
          state.categories.forEach((c) => {
            categoryNameCache[c.id] = c.name;
          });
          const list = $("category-list");
          list.innerHTML = `<div class="category-item active" data-id="" onclick="selectCategory(this,'')"><span>All Categories</span></div>`;
          state.categories.forEach((cat) => {
            const el = document.createElement("div");
            el.className = "category-item";
            el.dataset.id = cat.id;
            el.onclick = () => selectCategory(el, cat.id);
            el.innerHTML = `<span>${cat.name}</span>`;
            list.appendChild(el);
          });
        } catch (e) {
          console.warn("Categories:", e.message);
        }
      }

      async function fetchAllProductsForCache() {
        try {
          // Fetch discounted prices (what users actually pay)
          const data = await api("GET", "/api/products?limit=500");
          const items = data.items || [];

          if (!items.length) return;

          items.forEach((p) => {
            const imgs = Array.isArray(p.images) ? p.images : [];
            productImageCache[p.id] = imgs[0] || `https://picsum.photos/seed/${p.sku}/640/480`;
          });

          const maxCents = Math.max(...items.map((p) => p.price_cents || 0));
          const maxDollars = Math.ceil(maxCents / 100);
          PRICE_MAX = Math.ceil(maxDollars / 50) * 50;

          const minS = $("price-slider-min");
          const maxS = $("price-slider-max");
          minS.max = PRICE_MAX;
          maxS.max = PRICE_MAX;
          minS.value = 0;
          maxS.value = PRICE_MAX;

          const catCount = state.categories.length;
          $("shop-subtitle").textContent = `${data.total} products · ${catCount} categories`;

          initDualSlider();

          // Also fetch raw (pre-discount) prices from the table API for comparison
          try {
            const rawProducts = await api("GET", "/api/table/products");
            rawProducts.forEach((p) => {
              originalPriceCache[p.id] = p.price_cents;
            });
          } catch (e) {
            console.warn("Could not fetch raw prices for discount comparison:", e.message);
          }
        } catch (e) {
          console.warn("fetchAllProductsForCache:", e.message);
        }
      }

      function selectCategory(el, id) {
        document.querySelectorAll(".category-item").forEach((i) => i.classList.remove("active"));
        el.classList.add("active");
        state.selectedCategory = id;
        state.products.offset = 0;
        fetchProducts();
      }

      function resetFilters() {
        $("search-input").value = "";
        $("price-slider-min").value = 0;
        $("price-slider-max").value = PRICE_MAX;
        $("sort-select").value = "title_asc";
        initDualSlider();
        const allCat = document.querySelector('.category-item[data-id=""]');
        if (allCat) selectCategory(allCat, "");
        else fetchProducts();
      }

      function debouncedSearch() {
        clearTimeout(state.searchDebounce);
        state.searchDebounce = setTimeout(() => {
          state.products.offset = 0;
          fetchProducts();
        }, 380);
      }

      async function fetchProducts() {
        $("product-grid").innerHTML = '<div class="loading-area"><div class="spinner"></div></div>';
        const params = new URLSearchParams({ limit: state.products.limit, offset: state.products.offset });
        const search = $("search-input").value.trim();
        if (search) params.set("search", search);
        if (state.selectedCategory) params.set("category_id", state.selectedCategory);
        const minV = parseInt($("price-slider-min").value);
        const maxV = parseInt($("price-slider-max").value);
        if (minV > 0) params.set("min_price", minV * 100);
        if (maxV < PRICE_MAX) params.set("max_price", maxV * 100);
        try {
          const data = await api("GET", `/api/products?${params}`);
          state.products = { ...state.products, ...data };
          renderProducts(data);
        } catch (e) {
          $("product-grid").innerHTML = `<div class="no-data">${e.message}</div>`;
        }
      }

      function renderProducts(data) {
        const grid = $("product-grid"),
          countEl = $("products-count");
        if (data.total === 0) {
          countEl.innerHTML = "No products found";
          grid.innerHTML = '<div class="no-data" style="grid-column:1/-1">No products match your filters</div>';
          $("pagination").innerHTML = "";
          return;
        }
        const from = data.offset + 1,
          to = Math.min(data.offset + data.items.length, data.total);
        countEl.innerHTML = `Showing <span>${from}–${to}</span> of <span>${data.total}</span>`;
        grid.classList.toggle("list-view", state.viewMode === "list");

        let items = [...data.items];
        const sort = $("sort-select").value;
        if (sort === "title_desc") items.reverse();
        else if (sort === "price_asc") items.sort((a, b) => a.price_cents - b.price_cents);
        else if (sort === "price_desc") items.sort((a, b) => b.price_cents - a.price_cents);

        grid.innerHTML = items
          .map((p) => {
            const imgs = Array.isArray(p.images) ? p.images : [];
            const img = imgs[0] || `https://picsum.photos/seed/${p.sku}/640/480`;
            productImageCache[p.id] = img;

            const desc = trunc(p.description || "", 70);

            // Discount detection: compare discounted price vs raw original price
            const originalCents = originalPriceCache[p.id];
            const isDiscounted = originalCents && originalCents > p.price_cents;
            const discountPct = isDiscounted ? Math.round((1 - p.price_cents / originalCents) * 100) : 0;

            const discountBadge = isDiscounted ? `<span class="card-discount-badge">−${discountPct}%</span>` : "";

            const priceHtml = isDiscounted
              ? `<div class="card-price-wrap">
                   <span class="card-price-original">${fmtPrice(originalCents)}</span>
                   <span class="card-price discounted display"><sup>$</sup>${(p.price_cents / 100).toFixed(2)}</span>
                 </div>`
              : `<span class="card-price display"><sup>$</sup>${(p.price_cents / 100).toFixed(2)}</span>`;

            return `<div class="product-card" onclick="openProduct('${p.id}')">
      <div class="card-img">
        ${discountBadge}
        <img src="${img}" alt="${p.title}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${p.id}/640/480'" />
      </div>
      <div class="card-body">
        <div class="card-sku mono">${p.sku}</div>
        <div class="card-title">${p.title}</div>
        ${desc ? `<div class="card-desc">${desc}</div>` : ""}
        <div class="card-footer">
          ${priceHtml}
          <button class="btn-add" onclick="event.stopPropagation();quickAdd('${p.id}')" title="Add to cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      </div>
    </div>`;
          })
          .join("");

        renderPagination(data);
      }

      function renderPagination(data) {
        const pag = $("pagination");
        const totalPages = Math.ceil(data.total / data.limit);
        const cur = Math.floor(data.offset / data.limit) + 1;
        if (totalPages <= 1) {
          pag.innerHTML = "";
          return;
        }
        const pages = [];
        for (let p = 1; p <= totalPages; p++) {
          if (p === 1 || p === totalPages || (p >= cur - 2 && p <= cur + 2)) pages.push(p);
          else if (pages[pages.length - 1] !== "…") pages.push("…");
        }
        let html = `<button class="page-btn" onclick="goPage(${cur - 1})" ${cur === 1 ? "disabled" : ""}>← Prev</button>`;
        pages.forEach((p) => {
          if (p === "…") html += `<span class="page-ellipsis">…</span>`;
          else html += `<button class="page-btn ${p === cur ? "active" : ""}" onclick="goPage(${p})">${p}</button>`;
        });
        html += `<button class="page-btn" onclick="goPage(${cur + 1})" ${cur === totalPages ? "disabled" : ""}>Next →</button>`;
        pag.innerHTML = html;
      }

      function goPage(page) {
        const total = Math.ceil(state.products.total / state.products.limit);
        if (page < 1 || page > total) return;
        state.products.offset = (page - 1) * state.products.limit;
        fetchProducts();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function setView(mode) {
        state.viewMode = mode;
        $("btn-grid").classList.toggle("active", mode === "grid");
        $("btn-list").classList.toggle("active", mode === "list");
        $("product-grid").classList.toggle("list-view", mode === "list");
      }

      /* PRODUCT MODAL */
      async function openProduct(id) {
        try {
          // Table API returns raw (pre-discount) price
          const p = await api("GET", `/api/table/products/${id}`);
          state.currentProduct = p;
          state.modalQty = 1;
          $("modal-qty").textContent = "1";

          let images = [];
          if (Array.isArray(p.images)) images = p.images;
          else if (typeof p.images === "string") {
            try {
              images = JSON.parse(p.images);
            } catch {}
          }
          if (!images.length) images = [`https://picsum.photos/seed/${p.sku}/640/480`];

          productImageCache[p.id] = images[0];

          const mainImg = $("modal-main-img");
          mainImg.src = images[0];
          mainImg.alt = p.title;
          mainImg.onerror = () => {
            mainImg.src = `https://picsum.photos/seed/${p.id}/640/480`;
            mainImg.onerror = null;
          };

          $("modal-thumbs").innerHTML = images
            .map((src, i) => `<img class="modal-thumb ${i === 0 ? "active" : ""}" src="${src}" alt="" onclick="setModalImg(this,'${src}')" loading="lazy" onerror="this.style.display='none'" />`)
            .join("");
          $("modal-thumbs").style.display = images.length <= 1 ? "none" : "flex";

          $("modal-tag").textContent = "Product Details";
          $("modal-title").textContent = p.title;
          $("modal-sku").textContent = `SKU: ${p.sku}`;

          // ── DISCOUNT DISPLAY IN MODAL ──
          const rawCents = p.price_cents; // un-discounted price from table API
          const discountedCents = originalPriceCache[id]; // discounted price from /api/products
          // discountedCents is populated by fetchAllProductsForCache;
          // if it's less than raw, a discount was applied
          const hasDiscount = discountedCents != null && discountedCents < rawCents;
          const displayCents = hasDiscount ? discountedCents : rawCents;
          const discountAreaEl = $("modal-discount-area");
          const priceEl = $("modal-price");

          if (hasDiscount) {
            const pct = Math.round((1 - discountedCents / rawCents) * 100);
            discountAreaEl.innerHTML = `
              <div class="modal-discount-badge">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7m0 0H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
                ${pct}% off applied
              </div>
              <div class="modal-original-price">${fmtPrice(rawCents)}</div>`;
            priceEl.className = "modal-price display discounted";
          } else {
            discountAreaEl.innerHTML = "";
            priceEl.className = "modal-price display";
          }

          priceEl.innerHTML = `<sup>$</sup>${(displayCents / 100).toFixed(2)}`;
          $("modal-currency").textContent = `Currency: ${p.currency || "USD"}`;
          $("modal-desc").textContent = p.description || "No description available.";

          $("product-modal").classList.add("open");
          document.documentElement.classList.add("scroll-locked");
        } catch (e) {
          toast(e.message, "error");
        }
      }

      function setModalImg(el, src) {
        $("modal-main-img").src = src;
        document.querySelectorAll(".modal-thumb").forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
      }

      function closeProductModal(e) {
        if (e && e.target !== e.currentTarget) return;
        $("product-modal").classList.remove("open");
        document.documentElement.classList.remove("scroll-locked");
      }

      function changeQty(delta) {
        state.modalQty = Math.max(1, state.modalQty + delta);
        $("modal-qty").textContent = state.modalQty;
      }

      async function addModalToCart() {
        if (!state.user) {
          toast("Connect a session first", "error");
          return;
        }
        const btn = $("modal-add-btn");
        btn.disabled = true;
        btn.textContent = "Adding…";
        try {
          await addToCart(state.currentProduct.id, state.modalQty);
          closeProductModal();
          toast(`Added ${state.modalQty}× to cart`, "success");
        } catch (e) {
          toast(e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Add to Cart";
        }
      }

      async function quickAdd(productId) {
        if (!state.user) {
          toast("Connect a session first", "error");
          return;
        }
        try {
          await addToCart(productId, 1);
          toast("Added to cart", "success");
        } catch (e) {
          toast(e.message, "error");
        }
      }

      /* CART */
      async function loadCart() {
        if (!state.user) return;
        try {
          state.cart = await api("GET", `/api/cart/${state.user.id}`);
          updateCartBadge();
        } catch (e) {
          console.warn("Cart:", e.message);
        }
      }

      async function addToCart(productId, qty) {
        if (!state.user) throw new Error("No session");
        state.cart = await api("POST", "/api/cart/add", { user_id: state.user.id, product_id: productId, quantity: qty });
        updateCartBadge();
      }

      async function removeCartItem(productId) {
        if (!state.user || !state.cart) return;
        try {
          await api("DELETE", `/api/table/cart_items/${state.cart.cart_id},${productId}`);
          await loadCart();
          renderCartDrawer();
          toast("Item removed", "info");
        } catch (e) {
          toast(e.message, "error");
        }
      }

      async function clearCart() {
        if (!state.user || !state.cart) return;
        const items = state.cart.items || [];
        if (!items.length) return;
        const btn = $("btn-clear-cart");
        btn.textContent = "Clearing…";
        btn.disabled = true;
        try {
          await Promise.all(items.map((item) => api("DELETE", `/api/table/cart_items/${state.cart.cart_id},${item.product_id}`)));
          await loadCart();
          renderCartDrawer();
          toast("Cart cleared", "info");
        } catch (e) {
          toast(e.message, "error");
        } finally {
          btn.textContent = "Clear All";
          btn.disabled = false;
        }
      }

      function updateCartBadge() {
        const n = state.cart?.items?.length || 0;
        $("cart-count").textContent = n;
        $("cart-count").classList.toggle("show", n > 0);
      }

      function openCart() {
        renderCartDrawer();
        $("cart-overlay").classList.add("open");
        document.documentElement.classList.add("scroll-locked");
      }
      function closeCart(e) {
        if (e && e.target !== e.currentTarget) return;
        $("cart-overlay").classList.remove("open");
        document.documentElement.classList.remove("scroll-locked");
      }

      function renderCartDrawer() {
        const list = $("cart-items-list"),
          foot = $("cart-foot"),
          clearBtn = $("btn-clear-cart"),
          countEl = $("cart-item-count");
        const emptyHtml = (msg) =>
          `<div class="cart-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><p>${msg}</p></div>`;

        if (!state.user) {
          list.innerHTML = emptyHtml("Connect a session to use cart");
          foot.style.display = "none";
          clearBtn.style.display = "none";
          countEl.textContent = "";
          return;
        }
        const items = state.cart?.items || [];
        countEl.textContent = items.length ? `${items.length} item${items.length !== 1 ? "s" : ""}` : "";
        clearBtn.style.display = items.length ? "inline-block" : "none";
        if (!items.length) {
          list.innerHTML = emptyHtml("Your cart is empty");
          foot.style.display = "none";
          return;
        }

        list.innerHTML = items
          .map((item) => {
            const cachedImg = productImageCache[item.product_id];
            const thumbSrc = cachedImg || `https://picsum.photos/seed/${item.sku || item.product_id}/140/140`;

            // Show discount indicator in cart if the item has a discount applied
            const rawCents = originalPriceCache[item.product_id];
            const isDiscounted = rawCents && rawCents > item.unit_price_cents;
            const discountNote = isDiscounted ? `<span style="color:var(--red);font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;margin-left:4px">SALE</span>` : "";

            return `
    <div class="cart-item">
      <img class="cart-item-img" src="${thumbSrc}" alt="${item.title}"
           onerror="this.src='https://picsum.photos/seed/fallback${item.product_id}/140/140'" />
      <div class="cart-item-body">
        <div class="cart-item-title">${item.title}${discountNote}</div>
        <div class="cart-item-qty">× ${item.quantity} @ ${fmtPrice(item.unit_price_cents)}</div>
        <div class="cart-item-bottom">
          <span class="cart-item-price display">${fmtPrice(item.subtotal_cents)}</span>
          <button class="btn-remove-item" onclick="removeCartItem('${item.product_id}')">Remove</button>
        </div>
      </div>
    </div>`;
          })
          .join("");

        $("cart-total").textContent = fmtPrice(state.cart.total_cents);
        foot.style.display = "block";
      }

      async function checkout() {
        if (!state.user) return;
        const btn = document.querySelector(".cart-foot .btn-primary");
        btn.disabled = true;
        btn.textContent = "Processing…";
        try {
          const order = await api("POST", "/api/checkout", { user_id: state.user.id });
          state.cart = null;
          updateCartBadge();
          closeCart();
          toast(`Order placed — ${fmtPrice(order.total_cents)}`, "success");
        } catch (e) {
          toast(e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Proceed to Checkout";
        }
      }

      /* ═══════════════════════════════════════
         ADMIN
      ═══════════════════════════════════════ */
      async function initAdmin() {
        if (state.admin.tables.length) {
          if (!state.admin.currentTable) selectAdminTable(state.admin.tables[0].name);
          return;
        }
        try {
          state.admin.tables = await api("GET", "/api/table/metadata");
          const nav = $("admin-table-nav");
          nav.innerHTML =
            '<div class="table-nav-label">Tables</div>' +
            state.admin.tables.map((t) => `<button class="table-nav-item" id="tn-${t.name}" onclick="selectAdminTable('${t.name}')">${t.name} <span class="dot"></span></button>`).join("");
          selectAdminTable(state.admin.tables[0].name);
        } catch (e) {
          toast(e.message, "error");
        }
      }

      async function selectAdminTable(name) {
        state.admin.currentTable = name;
        state.admin.sortCol = null;
        state.admin.sortDir = "asc";
        state.admin.filter = "";
        state.admin.meta = state.admin.tables.find((t) => t.name === name);
        state.expandedOrders.clear();
        document.querySelectorAll(".table-nav-item").forEach((b) => b.classList.remove("active"));
        const btn = $(`tn-${name}`);
        if (btn) btn.classList.add("active");
        await loadAdminTable(name);
      }

      async function loadAdminTable(name) {
        $("data-panel").innerHTML = '<div class="loading-area"><div class="spinner"></div></div>';
        try {
          state.admin.rows = await api("GET", `/api/table/${name}`);
          state.expandedOrders.clear();
          renderDataPanel();
        } catch (e) {
          $("data-panel").innerHTML = `<div class="no-data">${e.message}</div>`;
        }
      }

      function isOrdersTable() {
        return state.admin.currentTable === "orders";
      }

      function isDiscountsTable() {
        return state.admin.currentTable === "discounts";
      }

      function renderDataPanel() {
        const { currentTable: name, rows, sortCol, sortDir, filter, meta } = state.admin;
        if (!meta) return;
        const panel = $("data-panel");

        let filtered = filter
          ? rows.filter((r) =>
              Object.values(r).some((v) =>
                String(v ?? "")
                  .toLowerCase()
                  .includes(filter.toLowerCase()),
              ),
            )
          : [...rows];

        if (sortCol) {
          filtered.sort((a, b) => {
            const av = a[sortCol],
              bv = b[sortCol];
            const cmp = av == null ? -1 : bv == null ? 1 : typeof av === "number" ? av - bv : String(av).localeCompare(String(bv));
            return sortDir === "asc" ? cmp : -cmp;
          });
        }

        const cols = meta.columns,
          MAX = 8;
        const displayCols = cols.length > MAX ? cols.slice(0, MAX) : cols;
        const extra = cols.length - displayCols.length;
        const isOrders = isOrdersTable();
        const isDiscounts = isDiscountsTable();

        const hintHtml = isOrders
          ? `<span style="font-size:10px;color:var(--text3);font-weight:400;margin-left:8px">↕ click a row to view items</span>`
          : isDiscounts
            ? `<span style="font-size:10px;color:rgba(200,84,84,0.7);font-weight:400;margin-left:8px">● discount rules applied at checkout</span>`
            : "";

        panel.innerHTML = `
    <div class="data-toolbar">
      <span class="data-title">${name}${hintHtml} <span style="color:var(--text3);font-size:11px;font-weight:400">(${filtered.length}/${rows.length})</span></span>
      <input type="text" class="table-search-bar" placeholder="Filter rows…" value="${filter}" oninput="adminFilter(this.value)" />
      <button class="btn-success" onclick="openCrudCreate()">+ New Row</button>
      <button class="btn-secondary" onclick="loadAdminTable('${name}')">↺ Refresh</button>
    </div>
    <div class="data-table-wrap"><table>
      <thead><tr>
        ${isOrders ? '<th style="width:26px;padding:9px 8px 9px 13px"></th>' : ""}
        ${displayCols.map((col) => `<th class="${sortCol === col ? "sorted-" + sortDir : ""}" onclick="adminSort('${col}')">${col}${meta.primary_keys.includes(col) ? " 🔑" : ""}</th>`).join("")}
        ${extra ? `<th style="color:var(--gold-dim)">+${extra} more</th>` : ""}
        <th>Actions</th>
      </tr></thead>
      <tbody id="admin-tbody">
        ${
          filtered.length === 0
            ? `<tr><td colspan="${displayCols.length + (extra ? 1 : 0) + (isOrders ? 2 : 1)}"><div class="no-data" style="padding:28px">No rows</div></td></tr>`
            : filtered
                .map((row) => {
                  const pkStr = meta.primary_keys.map((pk) => row[pk]).join(",");
                  const orderId = row[meta.primary_keys[0]];
                  const isExpanded = state.expandedOrders.has(orderId);

                  const dataCells = displayCols
                    .map((col) => {
                      const val = row[col];
                      let disp;
                      if (val === null || val === undefined) {
                        disp = `<span style="color:var(--text3);font-style:italic">null</span>`;
                      } else if (col === "is_active" || col === "active" || col === "is_default") {
                        disp = val === true || val === 1 || val === "1" ? '<span class="bool-true">✓</span>' : '<span class="bool-false">✗</span>';
                      } else if (isDiscounts && col === "percent") {
                        // Render discount percent as a styled pill
                        disp = `<span class="td-percent-pill">−${val}%</span>`;
                      } else if (isDiscounts && (col === "min_price_cents" || col === "max_price_cents") && val != null) {
                        disp = fmtPrice(Number(val));
                      } else if (isDiscounts && col === "category_id" && val) {
                        const catName = categoryNameCache[val] || val;
                        disp = `<span title="${val}">${catName}</span>`;
                      } else if (typeof val === "object") {
                        disp = `<span style="color:var(--text3)">[JSON]</span>`;
                      } else {
                        const s = String(val);
                        disp = s.length > 44 ? s.slice(0, 44) + "…" : s;
                      }
                      return `<td title="${String(val ?? "")}">${disp}</td>`;
                    })
                    .join("");

                  let rowsHtml = `<tr class="order-data-row ${isOrders && isExpanded ? "expanded" : ""}"
                  id="odr-${orderId}"
                  ${isOrders ? `onclick="toggleOrderExpand('${orderId}', '${pkStr}', this)"` : ""}>
                  ${
                    isOrders
                      ? `<td style="padding:9px 4px 9px 13px;width:26px">
                    <span class="expand-chevron">
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                    </span>
                  </td>`
                      : ""
                  }
                  ${dataCells}
                  ${extra ? `<td style="color:var(--text3)">…</td>` : ""}
                  <td onclick="event.stopPropagation()"><div class="td-actions">
                    <button class="action-btn copy" onclick="copyRowId('${pkStr}')">Copy</button>
                    <button class="action-btn edit" onclick="openCrudEdit('${pkStr}')">Edit</button>
                    <button class="action-btn del" onclick="deleteRow('${pkStr}')">Del</button>
                  </div></td>
                </tr>`;

                  if (isOrders) {
                    const cachedItems = state.expandedOrders.get(orderId);
                    const innerContent = cachedItems && cachedItems !== "loading" ? buildOrderItemsHtml(cachedItems) : cachedItems === "loading" ? buildOrderLoadingHtml() : "";
                    const colSpan = displayCols.length + (extra ? 1 : 0) + 2;
                    rowsHtml += `<tr class="order-expand-row" id="odr-expand-${orderId}">
                    <td colspan="${colSpan}">
                      <div class="expand-inner${isExpanded ? " open" : ""}" id="odr-inner-${orderId}">
                        <div class="expand-content" id="odr-content-${orderId}">
                          ${innerContent}
                        </div>
                      </div>
                    </td>
                  </tr>`;
                  }

                  return rowsHtml;
                })
                .join("")
        }
      </tbody>
    </table></div>`;
      }

      /* ── ORDER ROW EXPAND/COLLAPSE ── */
      async function toggleOrderExpand(orderId, pkStr, rowEl) {
        const inner = $(`odr-inner-${orderId}`);
        const dataRow = $(`odr-${orderId}`);
        if (!inner) return;

        const isOpen = inner.classList.contains("open");

        if (isOpen) {
          inner.classList.remove("open");
          dataRow.classList.remove("expanded");
          return;
        }

        inner.classList.add("open");
        dataRow.classList.add("expanded");

        if (state.expandedOrders.has(orderId) && state.expandedOrders.get(orderId) !== "loading") return;

        state.expandedOrders.set(orderId, "loading");
        const contentEl = $(`odr-content-${orderId}`);
        contentEl.innerHTML = buildOrderLoadingHtml();

        try {
          const row = state.admin.rows.find((r) => String(r[state.admin.meta.primary_keys[0]]) === String(orderId));
          let items = [];

          try {
            const allItems = await api("GET", "/api/table/order_items");
            items = allItems.filter((i) => String(i.order_id) === String(orderId));
          } catch (_) {}

          if (!items.length && row && row.cart_id) {
            try {
              const allCartItems = await api("GET", "/api/table/cart_items");
              items = allCartItems.filter((i) => String(i.cart_id) === String(row.cart_id));
            } catch (_) {}
          }

          if (!items.length) {
            try {
              const result = await api("GET", `/api/orders/${orderId}/items`);
              items = Array.isArray(result) ? result : result.items || [];
            } catch (_) {}
          }

          state.expandedOrders.set(orderId, items);
          contentEl.innerHTML = buildOrderItemsHtml(items);
        } catch (e) {
          state.expandedOrders.set(orderId, []);
          contentEl.innerHTML = `<p class="expand-empty">Could not load items: ${e.message}</p>`;
        }
      }

      function buildOrderLoadingHtml() {
        return `<div class="expand-loading"><div class="expand-spinner"></div>Loading items…</div>`;
      }

      function buildOrderItemsHtml(items) {
        const header = `
      <div class="expand-header">
        <span class="expand-label">Cart Items</span>
        <div class="expand-divider"></div>
        <span class="expand-count">${items.length} item${items.length !== 1 ? "s" : ""}</span>
      </div>`;

        if (!items.length) {
          return header + `<p class="expand-empty">No items found for this order.</p>`;
        }

        let totalCents = 0;
        const rows = items
          .map((item) => {
            const unitCents = item.unit_price_cents || item.price_cents || 0;
            const qty = item.quantity || 1;
            const subtotal = item.subtotal_cents || unitCents * qty;
            totalCents += subtotal;

            const productId = item.product_id || item.id || "";
            const imgSrc = productImageCache[productId] || `https://picsum.photos/seed/${productId || item.sku || Math.random()}/120/120`;
            const name = item.title || item.name || item.product_title || item.sku || `Item ${productId}`;
            const sku = item.sku ? `<span class="order-item-meta">${item.sku}</span>` : "";

            // Show discount badge inside order item row if applicable
            const rawCents = originalPriceCache[productId];
            const discountNote =
              rawCents && rawCents > unitCents ? `<span style="color:var(--red);font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-left:4px">SALE</span>` : "";

            return `<div class="order-item-row">
        <img class="order-item-img" src="${imgSrc}" alt="${name}"
          onerror="this.src='https://picsum.photos/seed/fallback${productId}/120/120'" />
        <div class="order-item-info">
          <div class="order-item-name">${name}${discountNote}</div>
          ${sku}
        </div>
        <div class="order-item-qty">× ${qty}</div>
        <div class="order-item-price">${fmtPrice(subtotal)}</div>
      </div>`;
          })
          .join("");

        const total = totalCents
          ? `<div class="expand-total-row">
        <span class="expand-total-label">Order Total</span>
        <span class="expand-total-val display">${fmtPrice(totalCents)}</span>
      </div>`
          : "";

        return header + `<div class="order-items-grid">${rows}</div>${total}`;
      }

      function adminFilter(val) {
        state.admin.filter = val;
        renderDataPanel();
      }

      function adminSort(col) {
        state.admin.sortDir = state.admin.sortCol === col ? (state.admin.sortDir === "asc" ? "desc" : "asc") : "asc";
        state.admin.sortCol = col;
        renderDataPanel();
      }

      /* CRUD */
      function buildCrudForm(row, meta, mode) {
        const autoManagedFields = ["id", "created_at", "updated_at"];
        const isDiscounts = state.admin.currentTable === "discounts";
        const isProductCreate = state.admin.currentTable === "products" && mode === "create";

        const formHtml = meta.columns
          .filter((col) => !autoManagedFields.includes(col))
          .map((col) => {
            const isPK = meta.primary_keys.includes(col);
            const val = row ? (row[col] ?? "") : "";
            const valStr = typeof val === "object" ? JSON.stringify(val, null, 2) : String(val);
            const ro = mode === "edit" && isPK ? "readonly" : "";
            const dim = mode === "edit" && isPK ? 'style="opacity:.4;pointer-events:none"' : "";
            const long = col === "description" || col === "images" || col === "password_hash";

            if (col === "category_id" && isDiscounts) {
              const options = state.categories.map((c) => `<option value="${c.id}"${c.id === valStr ? " selected" : ""}>${c.name}</option>`).join("");
              return `<div class="form-field">
      <label>${col}${isPK ? '<span class="pk-badge"> PK</span>' : ""}</label>
      <select name="${col}" ${ro} ${dim}>
        <option value="">No category</option>
        ${options}
      </select>
    </div>`;
            }

            return `<div class="form-field">
      <label>${col}${isPK ? '<span class="pk-badge"> PK</span>' : ""}</label>
      ${
        long
          ? `<textarea name="${col}" rows="3" ${ro} ${dim}>${valStr}</textarea>`
          : `<input type="text" name="${col}" value="${valStr.replace(/&/g, "&amp;").replace(/"/g, "&quot;")}" ${ro} ${dim} />`
      }
    </div>`;
          })
          .join("");

        if (isProductCreate) {
          const selectedCategory = row ? String(row.category_id || "") : "";
          const options = state.categories.map((c) => `<option value="${c.id}"${c.id === selectedCategory ? " selected" : ""}>${c.name}</option>`).join("");
          return (
            formHtml +
            `<div class="form-field">
      <label>category_id</label>
      <select name="category_id">
        <option value="">Select category</option>
        ${options}
      </select>
    </div>`
          );
        }

        return formHtml;
      }

      function openCrudCreate() {
        state.admin.crudMode = "create";
        $("crud-title").textContent = `New row — ${state.admin.currentTable}`;
        $("crud-body").innerHTML = buildCrudForm(null, state.admin.meta, "create");
        $("crud-overlay").classList.add("open");
      }

      async function openCrudEdit(pkStr) {
        try {
          const row = await api("GET", `/api/table/${state.admin.currentTable}/${encodeURIComponent(pkStr)}`);
          state.admin.crudMode = "edit";
          state.admin.crudRow = row;
          state.admin.editPk = pkStr;
          $("crud-title").textContent = `Edit — ${state.admin.currentTable}`;
          $("crud-body").innerHTML = buildCrudForm(row, state.admin.meta, "edit");
          $("crud-overlay").classList.add("open");
        } catch (e) {
          toast(e.message, "error");
        }
      }

      function closeCrudModal(e) {
        if (e && e.target !== e.currentTarget) return;
        $("crud-overlay").classList.remove("open");
      }

      async function saveCrudRow() {
        const autoManagedFields = ["id", "created_at", "updated_at"];
        const inputs = $("crud-body").querySelectorAll("input:not([readonly]), textarea:not([readonly]), select:not([readonly])");
        const payload = {};

        if (state.admin.crudMode === "edit" && state.admin.crudRow)
          state.admin.meta.primary_keys.forEach((pk) => {
            if (!autoManagedFields.includes(pk)) {
              payload[pk] = state.admin.crudRow[pk];
            }
          });

        inputs.forEach((inp) => {
          if (!inp.name || autoManagedFields.includes(inp.name)) return;
          let val = inp.value.trim();
          if (val === "null") val = null;
          else if (val === "true") val = true;
          else if (val === "false") val = false;
          else {
            try {
              val = JSON.parse(val);
            } catch {}
          }
          payload[inp.name] = val;
        });

        const btn = $("crud-save-btn");
        btn.disabled = true;
        btn.textContent = "Saving…";
        try {
          if (state.admin.crudMode === "create") {
            await api("POST", `/api/table/${state.admin.currentTable}`, payload);
            toast("Row created", "success");
          } else {
            await api("PUT", `/api/table/${state.admin.currentTable}/${state.admin.editPk}`, payload);
            toast("Row updated", "success");
          }
          closeCrudModal();
          await loadAdminTable(state.admin.currentTable);
          // Refresh promos sidebar if discounts were changed
          if (state.admin.currentTable === "discounts") loadPromotions();
        } catch (e) {
          toast(e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Save";
        }
      }

      async function deleteRow(pkStr) {
        if (!confirm(`Delete "${pkStr}" from ${state.admin.currentTable}?`)) return;
        try {
          await api("DELETE", `/api/table/${state.admin.currentTable}/${pkStr}`);
          toast("Row deleted", "info");
          await loadAdminTable(state.admin.currentTable);
          if (state.admin.currentTable === "discounts") loadPromotions();
        } catch (e) {
          toast(e.message, "error");
        }
      }

      function copyRowId(pkStr) {
        if (!navigator.clipboard) {
          toast("Clipboard not available", "error");
          return;
        }
        navigator.clipboard
          .writeText(pkStr)
          .then(() => toast("Row ID copied", "success"))
          .catch(() => toast("Failed to copy row ID", "error"));
      }

      /* KEYBOARD */
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if ($("crud-overlay").classList.contains("open")) {
            closeCrudModal();
            return;
          }
          if ($("product-modal").classList.contains("open")) {
            closeProductModal();
            return;
          }
          if ($("cart-overlay").classList.contains("open")) {
            closeCart();
            return;
          }
        }
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
          e.preventDefault();
          navigate("shop");
          setTimeout(() => $("search-input").focus(), 50);
        }
      });

      /* INIT */
      (async function init() {
        const saved = localStorage.getItem("arcane-theme");
        if (saved) setTheme(saved);
        initDualSlider();
        // Fetch categories first so categoryNameCache is ready for promotions
        await fetchCategories();
        // Then fetch products (discounted) + raw prices + promotions in parallel
        await Promise.all([fetchAllProductsForCache(), loadPromotions()]);
        await fetchProducts();
      })();
    </script>
  </body>
</html>
