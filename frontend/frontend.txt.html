<!doctype html>
<html lang="en" data-theme="noir">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCANE — E-Commerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      :root,
      html[data-theme="noir"] {
        --bg: #080809;
        --bg2: #0f0f12;
        --bg3: #17171c;
        --bg4: #1e1e25;
        --border: #2c2c36;
        --border2: #3a3a47;
        --text: #ede9e2;
        --text2: #9a9398;
        --text3: #5a575f;
        --gold: #c8a96e;
        --gold2: #e8cfa0;
        --gold-dim: #7a6540;
        --red: #c85454;
        --green: #4caf7a;
        --shadow: 0 8px 40px rgba(0, 0, 0, 0.65);
      }
      html[data-theme="ivory"] {
        --bg: #faf8f4;
        --bg2: #f2ede5;
        --bg3: #e8e1d8;
        --bg4: #ddd6cb;
        --border: #cfc8bc;
        --border2: #bcb3a5;
        --text: #1c1a16;
        --text2: #5c5751;
        --text3: #9c9690;
        --gold: #8b6510;
        --gold2: #5f4608;
        --gold-dim: #c8a96e;
        --red: #b03030;
        --green: #2e7a50;
        --shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      }
      html[data-theme="slate"] {
        --bg: #090c14;
        --bg2: #0e1320;
        --bg3: #141c2c;
        --bg4: #1b2538;
        --border: #283548;
        --border2: #364760;
        --text: #dce6f8;
        --text2: #7d91ae;
        --text3: #445570;
        --gold: #7aacdc;
        --gold2: #a8cef0;
        --gold-dim: #3d6890;
        --red: #d06060;
        --green: #48b87a;
        --shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      }
      html[data-theme="ember"] {
        --bg: #0e0b07;
        --bg2: #161009;
        --bg3: #1e1710;
        --bg4: #281f16;
        --border: #3a2c1c;
        --border2: #4c3c28;
        --text: #f2e8d8;
        --text2: #a89068;
        --text3: #6a5840;
        --gold: #e09830;
        --gold2: #f0bc60;
        --gold-dim: #905e10;
        --red: #c85454;
        --green: #4caf7a;
        --shadow: 0 8px 40px rgba(0, 0, 0, 0.7);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --radius: 6px;
        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      html {
        scroll-behavior: smooth;
        scrollbar-gutter: stable;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-weight: 400;
        font-size: 14px;
        line-height: 1.5;
        min-height: 100vh;
        overflow-x: hidden;
      }
      html.scroll-locked {
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
      }
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg2);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }
      .display {
        font-family: "Cormorant Garamond", serif;
      }
      .mono {
        font-family: "DM Mono", monospace;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 32px;
      }

      /* NAV */
      #nav {
        position: sticky;
        top: 0;
        z-index: 500;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
      }
      .nav-inner {
        display: flex;
        align-items: center;
        height: 60px;
        gap: 0;
      }
      .logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: var(--gold);
        text-transform: uppercase;
        flex: 0 0 auto;
        margin-right: 40px;
        cursor: pointer;
      }
      .logo span {
        color: var(--text3);
      }
      .nav-tabs {
        display: flex;
        gap: 2px;
      }
      .nav-tab {
        background: none;
        border: none;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text2);
        padding: 6px 16px;
        border-radius: var(--radius);
        transition:
          color var(--transition),
          background var(--transition);
        position: relative;
      }
      .nav-tab:hover {
        color: var(--text);
        background: var(--bg3);
      }
      .nav-tab.active {
        color: var(--gold);
      }
      .nav-tab.active::after {
        content: "";
        position: absolute;
        bottom: -16px;
        left: 0;
        right: 0;
        height: 1px;
        background: var(--gold);
      }
      .nav-right {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }
      .user-badge {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--text3);
        padding: 4px 12px;
        border: 1px solid var(--border);
        border-radius: 20px;
      }
      .user-badge.active {
        color: var(--green);
        border-color: rgba(76, 175, 122, 0.35);
        background: rgba(76, 175, 122, 0.06);
      }
      .btn-connect {
        background: none;
        border: 1px solid var(--gold-dim);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--gold);
        padding: 6px 14px;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .btn-connect:hover {
        background: var(--gold);
        color: var(--bg);
      }
      .btn-connect:disabled {
        opacity: 0.5;
        cursor: default;
        background: none;
        color: var(--gold);
      }
      .theme-picker {
        position: relative;
      }
      .theme-toggle-btn {
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--text2);
        width: 34px;
        height: 34px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
      }
      .theme-toggle-btn:hover {
        color: var(--gold);
        border-color: var(--border2);
        background: var(--bg3);
      }
      .theme-toggle-btn svg {
        width: 16px;
        height: 16px;
      }
      .theme-dropdown {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        opacity: 0;
        transform: translateY(-6px);
        pointer-events: none;
        transition:
          opacity 0.18s,
          transform 0.18s;
        box-shadow: var(--shadow);
        min-width: 130px;
        z-index: 10;
      }
      .theme-dropdown.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: all;
      }
      .theme-option {
        display: flex;
        align-items: center;
        gap: 10px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 7px 10px;
        border-radius: 4px;
        width: 100%;
        color: var(--text2);
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        transition: all var(--transition);
        text-align: left;
      }
      .theme-option:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .theme-option.active {
        color: var(--gold);
      }
      .theme-swatch {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid var(--border2);
        flex-shrink: 0;
      }
      .swatch-noir {
        background: #080809;
      }
      .swatch-ivory {
        background: #faf8f4;
        border-color: #cfc8bc;
      }
      .swatch-slate {
        background: #090c14;
      }
      .swatch-ember {
        background: #0e0b07;
      }
      .theme-option.active .theme-swatch {
        border-color: var(--gold);
      }
      .cart-btn {
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--text2);
        padding: 0 14px;
        height: 34px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        gap: 7px;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 500;
        transition: all var(--transition);
        position: relative;
      }
      .cart-btn:hover {
        color: var(--gold);
        border-color: var(--border2);
        background: var(--bg3);
      }
      .cart-btn svg {
        width: 16px;
        height: 16px;
      }
      .cart-count {
        background: var(--gold);
        color: var(--bg);
        font-size: 10px;
        font-weight: 600;
        min-width: 18px;
        height: 18px;
        border-radius: 9px;
        padding: 0 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0);
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .cart-count.show {
        opacity: 1;
        transform: scale(1);
      }

      /* PAGES */
      .page {
        display: none;
        animation: fadeIn 0.28s ease;
      }
      .page.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      /* SHOP */
      .shop-header {
        padding: 44px 0 36px;
        border-bottom: 1px solid var(--border);
      }
      .shop-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(34px, 5vw, 60px);
        font-weight: 300;
        font-style: italic;
        line-height: 1.1;
      }
      .shop-title em {
        color: var(--gold);
        font-style: normal;
      }
      .shop-subtitle {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.14em;
        color: var(--text3);
        text-transform: uppercase;
        margin-top: 10px;
      }
      .shop-layout {
        display: grid;
        grid-template-columns: 272px 1fr;
        gap: 0;
        min-height: 80vh;
      }
      .sidebar {
        border-right: 1px solid var(--border);
        padding: 28px 24px 28px 0;
        position: sticky;
        top: 60px;
        align-self: start;
        max-height: calc(100vh - 60px);
        overflow-y: auto;
      }
      .search-block {
        margin-bottom: 14px;
      }
      .search-wrap {
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        color: var(--text3);
        pointer-events: none;
        flex-shrink: 0;
      }
      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        background: var(--bg3);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 13px;
        padding: 9px 12px;
        border-radius: var(--radius);
        outline: none;
        appearance: none;
        transition:
          border-color var(--transition),
          background var(--transition);
      }
      input.search-input {
        padding-left: 36px;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--gold-dim);
        background: var(--bg4);
      }
      input::placeholder,
      textarea::placeholder {
        color: var(--text3);
        font-size: 12px;
      }
      select option {
        background: var(--bg3);
      }
      .filter-block {
        margin-bottom: 6px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .filter-toggle {
        width: 100%;
        background: var(--bg2);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 13px;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
        transition:
          color var(--transition),
          background var(--transition);
      }
      .filter-toggle:hover {
        background: var(--bg3);
        color: var(--text2);
      }
      .filter-toggle.open {
        color: var(--gold);
      }
      .filter-arrow {
        width: 13px;
        height: 13px;
        color: var(--text3);
        transition: transform 0.25s ease;
        flex-shrink: 0;
      }
      .filter-toggle.open .filter-arrow {
        transform: rotate(180deg);
        color: var(--gold);
      }
      .filter-body {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
          padding 0.3s;
        padding: 0 13px;
        background: var(--bg);
      }
      .filter-body.open {
        max-height: 380px;
        padding: 12px 13px 14px;
      }
      .category-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .category-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 10px;
        border-radius: 4px;
        cursor: pointer;
        transition: all var(--transition);
        font-size: 13px;
        color: var(--text2);
        border: 1px solid transparent;
      }
      .category-item:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .category-item.active {
        background: var(--bg3);
        color: var(--gold);
        border-color: var(--border);
      }
      .range-labels {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        font-weight: 500;
        color: var(--gold);
        margin-bottom: 14px;
      }
      .range-labels span {
        font-family: "DM Mono", monospace;
      }
      .dual-range {
        position: relative;
        height: 30px;
        margin: 0 4px;
      }
      .range-track {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        left: 0;
        right: 0;
        height: 3px;
        background: var(--border);
        border-radius: 2px;
      }
      .range-fill {
        position: absolute;
        height: 100%;
        background: var(--gold);
        border-radius: 2px;
      }
      .dual-range input[type="range"] {
        position: absolute;
        width: 100%;
        height: 3px;
        background: transparent;
        pointer-events: none;
        -webkit-appearance: none;
        appearance: none;
        top: 50%;
        transform: translateY(-50%);
        margin: 0;
        padding: 0;
        border: none;
        border-radius: 0;
      }
      .dual-range input[type="range"]::-webkit-slider-thumb {
        pointer-events: all;
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--gold);
        border: 2.5px solid var(--bg);
        cursor: grab;
        box-shadow: 0 0 0 1px var(--gold);
        transition: transform 0.15s;
      }
      .dual-range input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      .dual-range input[type="range"]::-webkit-slider-thumb:active {
        cursor: grabbing;
      }
      .dual-range input[type="range"]::-moz-range-thumb {
        pointer-events: all;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--gold);
        border: 2px solid var(--bg);
        cursor: grab;
      }
      input[type="range"]:focus {
        outline: none;
      }
      .sort-select {
        width: 100%;
        cursor: pointer;
        font-size: 13px;
      }
      .btn-reset {
        width: 100%;
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text3);
        padding: 9px;
        border-radius: var(--radius);
        transition: all var(--transition);
        margin-top: 10px;
      }
      .btn-reset:hover {
        border-color: var(--border2);
        color: var(--text);
      }
      .products-area {
        padding: 28px 0 28px 32px;
      }
      .products-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .products-count {
        font-size: 12px;
        color: var(--text3);
      }
      .products-count span {
        color: var(--text2);
        font-weight: 500;
      }
      .view-toggle {
        display: flex;
        gap: 4px;
      }
      .view-btn {
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--text3);
        padding: 6px 8px;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .view-btn:hover,
      .view-btn.active {
        color: var(--gold);
        border-color: var(--border2);
        background: var(--bg3);
      }
      .view-btn svg {
        width: 14px;
        height: 14px;
        display: block;
      }
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(215px, 1fr));
        gap: 16px;
      }
      .product-grid.list-view {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .product-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition:
          border-color var(--transition),
          box-shadow var(--transition),
          transform var(--transition);
      }
      .product-card:hover {
        border-color: var(--border2);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        transform: translateY(-2px);
      }
      .product-card:hover .card-img img {
        transform: scale(1.05);
      }
      .card-img {
        aspect-ratio: 4/3;
        overflow: hidden;
        background: var(--bg3);
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      .card-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      /* ── DISCOUNT BADGE (card image overlay) ── */
      .card-discount-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: var(--red);
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 3px 7px;
        border-radius: 3px;
        z-index: 1;
        pointer-events: none;
      }
      .card-body {
        padding: 13px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .card-sku {
        font-family: "DM Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.15em;
        color: var(--text3);
        text-transform: uppercase;
      }
      .card-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        line-height: 1.4;
      }
      .card-desc {
        font-size: 11px;
        color: var(--text3);
        line-height: 1.5;
        flex: 1;
      }
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }
      /* ── PRICE DISPLAY (with optional original strike-through) ── */
      .card-price-wrap {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .card-price-original {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--text3);
        text-decoration: line-through;
        line-height: 1;
      }
      .card-price {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        font-weight: 400;
        color: var(--gold);
        line-height: 1;
      }
      .card-price.discounted {
        color: var(--red);
      }
      .card-price sup {
        font-size: 12px;
        vertical-align: super;
      }
      .btn-add {
        background: none;
        border: 1px solid var(--border2);
        cursor: pointer;
        color: var(--text2);
        width: 30px;
        height: 30px;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all var(--transition);
        flex-shrink: 0;
      }
      .btn-add:hover {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
      }
      .btn-add svg {
        width: 13px;
        height: 13px;
      }
      .product-grid.list-view .product-card {
        flex-direction: row;
      }
      .product-grid.list-view .card-img {
        width: 120px;
        height: auto;
        aspect-ratio: auto;
        flex: 0 0 120px;
        border-bottom: none;
        border-right: 1px solid var(--border);
      }
      .product-grid.list-view .card-body {
        padding: 14px 18px;
        flex-direction: row;
        align-items: center;
        gap: 18px;
      }
      .product-grid.list-view .card-desc {
        flex: 1;
      }
      .product-grid.list-view .card-footer {
        margin-top: 0;
        padding-top: 0;
        border-top: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        margin-top: 36px;
        padding-bottom: 56px;
        flex-wrap: wrap;
      }
      .page-btn {
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: "DM Mono", monospace;
        font-size: 11px;
        color: var(--text2);
        padding: 6px 12px;
        border-radius: var(--radius);
        transition: all var(--transition);
        min-width: 36px;
      }
      .page-btn:hover:not(:disabled) {
        border-color: var(--border2);
        color: var(--text);
        background: var(--bg3);
      }
      .page-btn.active {
        background: var(--gold);
        border-color: var(--gold);
        color: var(--bg);
        font-weight: 500;
      }
      .page-btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .page-ellipsis {
        color: var(--text3);
        padding: 0 4px;
        font-family: "DM Mono", monospace;
      }

      /* ── PROMOTIONS SIDEBAR ── */
      .promo-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .promo-item {
        display: grid;
        grid-template-columns: 46px 1fr;
        gap: 10px;
        align-items: center;
        padding: 9px 10px;
        background: var(--bg2);
        border: 1px solid rgba(200, 84, 84, 0.22);
        border-radius: var(--radius);
        transition: border-color var(--transition);
      }
      .promo-item:hover {
        border-color: rgba(200, 84, 84, 0.5);
      }
      .promo-percent-block {
        text-align: center;
        background: rgba(200, 84, 84, 0.1);
        border-radius: 4px;
        padding: 5px 4px 3px;
      }
      .promo-percent-num {
        font-family: "Cormorant Garamond", serif;
        font-size: 20px;
        font-weight: 500;
        color: var(--red);
        line-height: 1;
        display: block;
      }
      .promo-percent-off {
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--red);
        opacity: 0.75;
      }
      .promo-info {
        min-width: 0;
      }
      .promo-name {
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .promo-scope {
        font-size: 10px;
        color: var(--text3);
        margin-top: 2px;
        line-height: 1.4;
      }
      .promo-empty {
        font-size: 11px;
        color: var(--text3);
        font-style: italic;
        padding: 4px 2px;
      }
      .promo-loading {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text3);
        padding: 4px 0;
      }
      .promo-spinner {
        width: 12px;
        height: 12px;
        border: 1.5px solid var(--border);
        border-top-color: var(--red);
        border-radius: 50%;
        animation: spin 0.5s linear infinite;
        flex-shrink: 0;
      }

      /* PRODUCT MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 800;
        background: rgba(0, 0, 0, 0.82);
        backdrop-filter: blur(12px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .modal {
        background: var(--bg2);
        border: 1px solid var(--border);
        max-width: 860px;
        width: 100%;
        max-height: 90vh;
        overflow-y: auto;
        border-radius: 8px;
        transform: translateY(20px) scale(0.97);
        transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        position: relative;
      }
      .modal-overlay.open .modal {
        transform: translateY(0) scale(1);
      }
      .modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 10;
        background: var(--bg3);
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--text2);
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        transition: all var(--transition);
      }
      .modal-close:hover {
        color: var(--text);
        background: var(--bg4);
        border-color: var(--border2);
      }
      .modal-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 420px;
      }
      .modal-gallery {
        background: var(--bg3);
        position: relative;
        display: flex;
        flex-direction: column;
      }
      .modal-main-img {
        width: 100%;
        object-fit: cover;
        display: block;
        flex: 1;
        min-height: 280px;
        max-height: 440px;
      }
      .modal-thumbs {
        display: flex;
        gap: 3px;
        padding: 3px;
        background: var(--bg);
        flex-shrink: 0;
      }
      .modal-thumb {
        flex: 1;
        aspect-ratio: 1;
        object-fit: cover;
        cursor: pointer;
        opacity: 0.45;
        transition: opacity 0.2s;
        border: 1px solid transparent;
        max-height: 58px;
      }
      .modal-thumb.active,
      .modal-thumb:hover {
        opacity: 1;
        border-color: var(--gold);
      }
      .modal-info {
        padding: 30px;
        display: flex;
        flex-direction: column;
      }
      .modal-tag {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .modal-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 26px;
        font-weight: 300;
        line-height: 1.2;
        color: var(--text);
        margin-bottom: 3px;
      }
      .modal-sku {
        font-family: "DM Mono", monospace;
        font-size: 10px;
        color: var(--text3);
        margin-bottom: 18px;
      }
      /* ── MODAL DISCOUNT DISPLAY ── */
      .modal-discount-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(200, 84, 84, 0.12);
        border: 1px solid rgba(200, 84, 84, 0.35);
        color: var(--red);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 3px;
        margin-bottom: 6px;
        width: fit-content;
      }
      .modal-original-price {
        font-family: "DM Mono", monospace;
        font-size: 12px;
        color: var(--text3);
        text-decoration: line-through;
        margin-bottom: 2px;
      }
      .modal-price {
        font-family: "Cormorant Garamond", serif;
        font-size: 42px;
        font-weight: 300;
        color: var(--gold);
        line-height: 1;
        margin-bottom: 4px;
      }
      .modal-price.discounted {
        color: var(--red);
      }
      .modal-price sup {
        font-size: 20px;
        vertical-align: super;
      }
      .modal-currency {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 16px;
      }
      .modal-divider {
        height: 1px;
        background: var(--border);
        margin: 14px 0;
      }
      .modal-desc {
        font-size: 13px;
        color: var(--text2);
        line-height: 1.7;
        flex: 1;
        margin-bottom: 18px;
      }
      .qty-row {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }
      .qty-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
      }
      .qty-ctrl {
        display: flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      .qty-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text2);
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all var(--transition);
      }
      .qty-btn:hover {
        color: var(--gold);
        background: var(--bg3);
      }
      .qty-num {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        color: var(--text);
        width: 38px;
        text-align: center;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        line-height: 32px;
      }
      .btn-primary {
        background: var(--gold);
        color: var(--bg);
        border: none;
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 13px 20px;
        width: 100%;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .btn-primary:hover {
        background: var(--gold2);
      }
      .btn-primary:active {
        transform: scale(0.98);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: default;
      }

      /* CART DRAWER */
      .cart-overlay {
        position: fixed;
        inset: 0;
        z-index: 700;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(6px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s;
      }
      .cart-overlay.open {
        opacity: 1;
        pointer-events: all;
      }
      .cart-drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 701;
        width: 420px;
        max-width: 100vw;
        background: var(--bg2);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .cart-overlay.open .cart-drawer {
        transform: translateX(0);
      }
      .cart-head {
        padding: 18px 20px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .cart-head-left {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .cart-head-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 22px;
        font-weight: 300;
      }
      .cart-item-count {
        font-size: 11px;
        color: var(--text3);
      }
      .cart-head-right {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-clear-cart {
        background: none;
        border: 1px solid rgba(200, 84, 84, 0.4);
        cursor: pointer;
        color: var(--red);
        font-family: "Inter", sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 4px 10px;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .btn-clear-cart:hover {
        background: var(--red);
        color: #fff;
      }
      .cart-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text2);
        font-size: 22px;
        line-height: 1;
        padding: 2px;
        transition: color var(--transition);
      }
      .cart-close:hover {
        color: var(--text);
      }
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 12px 18px;
      }
      .cart-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text3);
        text-align: center;
        gap: 14px;
      }
      .cart-empty svg {
        width: 42px;
        height: 42px;
        opacity: 0.2;
      }
      .cart-empty p {
        font-size: 12px;
        font-weight: 500;
        color: var(--text3);
      }
      .cart-item {
        display: grid;
        grid-template-columns: 66px 1fr;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .cart-item-img {
        width: 66px;
        height: 66px;
        object-fit: cover;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 4px;
        flex-shrink: 0;
      }
      .cart-item-body {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .cart-item-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cart-item-qty {
        font-size: 11px;
        color: var(--text3);
      }
      .cart-item-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
      }
      .cart-item-price {
        font-family: "Cormorant Garamond", serif;
        font-size: 17px;
        color: var(--gold);
      }
      .btn-remove-item {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text3);
        font-family: "Inter", sans-serif;
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 2px 6px;
        border-radius: 3px;
        transition: all var(--transition);
      }
      .btn-remove-item:hover {
        color: var(--red);
        background: rgba(200, 84, 84, 0.1);
      }
      .cart-foot {
        padding: 14px 18px;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .cart-total-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
      }
      .cart-total-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
      }
      .cart-total-val {
        font-family: "Cormorant Garamond", serif;
        font-size: 30px;
        font-weight: 300;
        color: var(--text);
      }

      /* ADMIN */
      #page-admin {
        padding: 40px 0 80px;
      }
      .page-heading {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(26px, 4vw, 48px);
        font-weight: 300;
        font-style: italic;
        margin-bottom: 32px;
      }
      .page-heading em {
        color: var(--gold);
        font-style: normal;
      }
      .admin-layout {
        display: grid;
        grid-template-columns: 185px 1fr;
        gap: 0;
      }
      .table-nav {
        border-right: 1px solid var(--border);
        padding: 0 18px 0 0;
      }
      .table-nav-label {
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 8px;
        padding-left: 9px;
      }
      .table-nav-item {
        background: none;
        border: none;
        cursor: pointer;
        width: 100%;
        text-align: left;
        padding: 8px 9px;
        border-radius: var(--radius);
        font-family: "Inter", sans-serif;
        font-size: 12px;
        font-weight: 400;
        color: var(--text2);
        transition: all var(--transition);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .table-nav-item:hover {
        background: var(--bg3);
        color: var(--text);
      }
      .table-nav-item.active {
        background: var(--bg3);
        color: var(--gold);
        font-weight: 500;
      }
      .table-nav-item .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .table-nav-item.active .dot {
        opacity: 1;
      }
      /* Highlight discounts table in nav */
      .table-nav-item[id="tn-discounts"] {
        color: rgba(200, 84, 84, 0.75);
      }
      .table-nav-item[id="tn-discounts"].active {
        color: var(--red);
      }
      .table-nav-item[id="tn-discounts"].active .dot {
        background: var(--red);
      }
      .data-panel {
        padding: 0 0 0 32px;
      }
      .data-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .data-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        flex: 1;
      }
      .btn-secondary {
        background: none;
        border: 1px solid var(--border2);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text2);
        padding: 7px 13px;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .btn-secondary:hover {
        color: var(--text);
        border-color: var(--text3);
      }
      .btn-success {
        background: none;
        border: 1px solid rgba(76, 175, 122, 0.4);
        cursor: pointer;
        font-family: "Inter", sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--green);
        padding: 7px 13px;
        border-radius: var(--radius);
        transition: all var(--transition);
      }
      .btn-success:hover {
        background: var(--green);
        color: var(--bg);
      }
      .table-search-bar {
        width: 220px;
        font-size: 12px;
      }
      .data-table-wrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: "Inter", sans-serif;
      }
      thead {
        position: sticky;
        top: 0;
        z-index: 10;
      }
      th {
        background: var(--bg3);
        padding: 9px 13px;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text3);
        text-align: left;
        white-space: nowrap;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
        transition: color var(--transition);
      }
      th:hover {
        color: var(--text);
      }
      th.sorted-asc::after {
        content: " ↑";
        color: var(--gold);
      }
      th.sorted-desc::after {
        content: " ↓";
        color: var(--gold);
      }
      td {
        padding: 9px 13px;
        font-size: 12px;
        color: var(--text2);
        border-bottom: 1px solid var(--border);
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--bg3);
        color: var(--text);
      }
      .td-actions {
        display: flex;
        gap: 5px;
      }
      .action-btn {
        background: none;
        border: 1px solid var(--border);
        cursor: pointer;
        color: var(--text3);
        font-size: 10px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 3px;
        font-family: "Inter", sans-serif;
        transition: all var(--transition);
      }
      .action-btn:hover {
        border-color: var(--border2);
        color: var(--text);
      }
      .action-btn.edit:hover {
        color: var(--gold);
        border-color: var(--gold-dim);
      }
      .action-btn.del:hover {
        color: var(--red);
        border-color: rgba(200, 84, 84, 0.5);
      }
      /* Discount percent pill in admin table */
      .td-percent-pill {
        display: inline-flex;
        align-items: center;
        background: rgba(200, 84, 84, 0.12);
        border: 1px solid rgba(200, 84, 84, 0.3);
        color: var(--red);
        font-size: 11px;
        font-weight: 600;
        padding: 1px 7px;
        border-radius: 20px;
        white-space: nowrap;
      }

      /* ── ORDER EXPAND ROW ── */
      tr.order-data-row {
        cursor: pointer;
      }
      tr.order-data-row td {
        transition:
          background var(--transition),
          color var(--transition);
      }
      tr.order-data-row.expanded td {
        background: var(--bg3) !important;
        color: var(--text) !important;
        border-bottom: none;
      }
      .expand-chevron {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        color: var(--text3);
        transition:
          transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
          color 0.2s;
        flex-shrink: 0;
      }
      tr.order-data-row.expanded .expand-chevron {
        transform: rotate(180deg);
        color: var(--gold);
      }
      tr.order-expand-row td {
        padding: 0 !important;
        background: var(--bg) !important;
        border-bottom: 2px solid var(--gold-dim) !important;
        overflow: hidden;
      }
      tr.order-expand-row:hover td {
        background: var(--bg) !important;
        color: var(--text2) !important;
      }
      .expand-inner {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);

        align-items: center;
        gap: 10px;
        margin-bottom: 12px;

      .expand-divider {

      .expand-count {

        color: var(--text3);

      }
      .order-items-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 260px;
        overflow-y: auto;
        padding-right: 4px;
        scrollbar-width: thin;
        scrollbar-color: var(--border2) transparent;

        width: 4px;
      }
      .order-items-grid::-webkit-scrollbar-track {
        background: transparent;
      }
      .order-items-grid::-webkit-scrollbar-thumb {
        background: var(--border2);
        border-radius: 2px;
      }
      .order-item-row {
        display: grid;
        grid-template-columns: 44px 1fr auto auto;
        align-items: center;
        gap: 12px;

        height: 44px;

        background: var(--bg3);
        border: 1px solid var(--border);

      .order-item-info {
        min-width: 0;
      }
      .order-item-name {

        font-weight: 500;
        color: var(--text);

      .order-item-meta {

      .expand-loading {

        gap: 10px;
        color: var(--text3);
        font-size: 12px;
        padding: 8px 0;

        height: 14px;
        border: 2px solid var(--border);

        border-radius: 50%;

      }
      .expand-empty {

        color: var(--text3);
        font-style: italic;
        padding: 6px 0;
      }

        padding-top: 10px;

        font-size: 20px;

      }

      /* CRUD modal */
      .crud-overlay {
        position: fixed;
        inset: 0;
        z-index: 900;
        background: rgba(0, 0, 0, 0.86);
        backdrop-filter: blur(14px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.18s;

        opacity: 1;
        pointer-events: all;
      }

        background: var(--bg2);
        border: 1px solid var(--border);
        width: 100%;
        max-width: 560px;
        max-height: 90vh;
        overflow-y: auto;

        transform: translateY(14px);
        transition: transform 0.24s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      .crud-overlay.open .crud-modal {
        transform: translateY(0);
      }
      .crud-head {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        background: var(--bg2);
        z-index: 1;

        font-size: 13px;
        font-weight: 500;
        color: var(--text);
      }
      .crud-body {
        padding: 20px;
      }

        margin-bottom: 13px;
      }
      .form-field label {
        display: block;
        margin-bottom: 5px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text3);

        justify-content: flex-end;

      }

      /* toast */
      .toast-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 6px;
        pointer-events: none;
      }
      .toast {
        background: var(--bg3);
        border: 1px solid var(--border);
        padding: 10px 16px;
        border-radius: var(--radius);
        font-size: 12px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
        animation: toastIn 0.28s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        pointer-events: all;
      }
      .toast.leaving {
        animation: toastOut 0.22s ease forwards;
      }
      .toast-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .toast.success .toast-dot {
        background: var(--green);
      }
      .toast.error .toast-dot {
        background: var(--red);
      }
      .toast.info .toast-dot {
        background: var(--gold);
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes toastOut {
        to {
          opacity: 0;
          transform: translateY(6px) scale(0.96);
        }
      }
      .spinner {
        width: 22px;
        height: 22px;
        border: 2px solid var(--border);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spin 0.55s linear infinite;
        margin: 60px auto;

          transform: rotate(360deg);
        }
      }
      .loading-area {
        display: flex;

        padding: 60px;

      }
      .bool-true {
        color: var(--green);
        font-weight: 500;
      }

        }

        }

        }
      }
    </style>
